<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manyoni Ridge — Operations</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>

  :root {
    --soil: #8B6914; --savanna: #C4A35A; --grass: #7A9E4E;
    --sky: #5B8DB8; --dusk: #D4622A; --ember: #E8793A;
    --dark: #141210; --dark-mid: #1C1915; --dark-light: #252118;
    --surface: #2E2920; --surface-hi: #3A342A; --surface-top: #453E32;
    --border: #3D3628; --border-hi: #524A3A;
    --text: #EDE5CF; --text-sec: #9A8E72; --text-muted: #5C5444;
    --accent: #C4A35A; --accent-hi: #E8C86A;
    --green: #7A9E4E; --green-hi: #96C25E;
    --red: #B85A4A; --red-hi: #D46A58;
    --blue: #5B8DB8; --orange: #D4622A;
    --r: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Libre Baskerville', Georgia, serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── LAYOUT ── */
  .app { display: flex; height: 100vh; overflow: hidden; }

  .sidebar {
    width: 220px; min-width: 220px;
    background: var(--dark-mid);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    transition: width 0.25s;
  }
  .sidebar.collapsed { width: 56px; min-width: 56px; }

  .sidebar-logo {
    padding: 16px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-mark {
    width: 30px; height: 30px; min-width: 30px;
    background: var(--accent);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 14px;
    color: var(--dark);
  }
  .logo-text { overflow: hidden; }
  .logo-text .name { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; }
  .logo-text .sub { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }

  nav { flex: 1; padding: 10px 8px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }

  .nav-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px;
    border-radius: var(--r); border: none;
    background: transparent; color: var(--text-muted);
    cursor: pointer; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.5px;
    border-left: 3px solid transparent;
    transition: all 0.15s; white-space: nowrap; overflow: hidden;
    text-align: left; width: 100%;
  }
  .nav-btn:hover { background: var(--surface); color: var(--text-sec); }
  .nav-btn.active {
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    color: var(--accent-hi);
    border-left-color: var(--accent);
  }
  .nav-icon { font-size: 15px; min-width: 18px; text-align: center; }

  .sidebar-footer {
    padding: 10px 14px 14px;
    border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-muted);
  }
  .status-dot {
    display: inline-block; width: 7px; height: 7px;
    border-radius: 50%; background: var(--green);
    box-shadow: 0 0 6px var(--green);
    margin-right: 6px;
  }

  /* ── MAIN ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    padding: 12px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--dark-mid);
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .topbar-left { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--text-muted); }
  .topbar-right { display: flex; align-items: center; gap: 14px; }

  .alert-badge {
    display: flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted);
  }
  .alert-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--orange); box-shadow: 0 0 8px var(--orange); }

  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--surface-hi);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--accent); font-weight: 700;
    cursor: pointer; font-family: 'JetBrains Mono', monospace;
  }

  .content { flex: 1; overflow-y: auto; padding: 28px 32px; }

  /* ── CARDS ── */
  .card {
    background: var(--dark-mid);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 18px 20px;
  }
  .card-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2px;
    color: var(--text-muted); text-transform: uppercase;
    margin-bottom: 14px;
  }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
  .col-gap { display: flex; flex-direction: column; gap: 16px; }

  /* ── SECTION TITLE ── */
  .section-title { margin-bottom: 20px; }
  .section-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
  .section-h { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }

  /* ── STAT BLOCK ── */
  .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 700; letter-spacing: -1px; }
  .stat-unit { font-size: 13px; font-weight: 400; color: var(--text-sec); margin-left: 4px; }

  /* ── BUTTONS ── */
  .btn {
    padding: 7px 16px; border-radius: var(--r); border: none;
    cursor: pointer; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500; letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: var(--dark); }
  .btn-primary:hover { background: var(--accent-hi); }
  .btn-ghost { background: transparent; color: var(--text-sec); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--border-hi); color: var(--text); }
  .btn-danger { background: var(--red); color: var(--text); }

  /* ── FILTER TABS ── */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-btn {
    padding: 5px 13px; border-radius: 4px; border: 1px solid var(--border);
    background: transparent; color: var(--text-sec);
    cursor: pointer; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.15s;
  }
  .filter-btn.active { background: var(--accent); color: var(--dark); border-color: var(--accent); }

  /* ── BADGES ── */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    border: 1px solid;
  }

  /* ── PRIORITY DOT ── */
  .p-dot {
    display: inline-block; width: 7px; height: 7px;
    border-radius: 50%; flex-shrink: 0;
  }

  /* ── TASK ROW ── */
  .task-row {
    padding: 12px 14px;
    background: var(--surface);
    border-radius: var(--r);
    border: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .task-row:hover { border-color: var(--border-hi); background: var(--surface-hi); }
  .task-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
  .task-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); display: flex; gap: 14px; flex-wrap: wrap; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; backdrop-filter: blur(3px);
  }
  .modal {
    background: var(--dark-mid);
    border: 1px solid var(--border-hi);
    border-radius: 8px;
    padding: 28px;
    width: 560px; max-width: 95vw;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--accent); }

  /* ── FORM ── */
  .form-group { margin-bottom: 14px; }
  .form-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 9px 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); color: var(--text);
    font-family: 'Libre Baskerville', serif; font-size: 13px;
    transition: border-color 0.15s; outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-select { cursor: pointer; }
  .form-select option { background: var(--surface); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* ── ALERT BANNER ── */
  .alert-banner {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: var(--r);
    margin-bottom: 8px;
    border-left: 3px solid;
    font-size: 13px;
  }
  .alert-icon { font-size: 15px; flex-shrink: 0; }

  /* ── LOADING ── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 40px; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    letter-spacing: 2px;
    flex-direction: column; gap: 14px;
  }
  .spinner {
    width: 24px; height: 24px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── EMPTY STATE ── */
  .empty {
    padding: 40px; text-align: center;
    color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 1px;
  }

  /* ── TOAST ── */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    padding: 12px 18px; border-radius: var(--r);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    animation: slideIn 0.3s ease; min-width: 260px;
    border: 1px solid;
  }
  .toast.success { background: color-mix(in srgb, var(--green) 15%, var(--dark-mid)); border-color: var(--green); color: var(--green-hi); }
  .toast.error { background: color-mix(in srgb, var(--red) 15%, var(--dark-mid)); border-color: var(--red); color: var(--red-hi); }
  .toast.info { background: color-mix(in srgb, var(--blue) 15%, var(--dark-mid)); border-color: var(--blue); color: var(--sky); }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

  /* ── LOG ROW ── */
  .log-row {
    padding: 10px 14px; background: var(--surface);
    border-radius: var(--r); border: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px;
  }
  .log-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Dashboard welcome */
  .welcome-bar { margin-bottom: 22px; }
  .welcome-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--text-muted); margin-bottom: 5px; }
  .welcome-h { font-size: 24px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  .welcome-date { font-size: 13px; color: var(--text-sec); margin-top: 3px; }

  /* Status colors via data attr */
  [data-status="operational"], [data-status="completed"], [data-status="verified"] { color: var(--green); }
  [data-status="in_progress"], [data-status="assigned"] { color: var(--sky); }
  [data-status="created"] { color: var(--text-muted); }
  [data-status="maintenance"], [data-status="medium"] { color: var(--orange); }
  [data-status="fault"], [data-status="high"] { color: var(--red); }
  [data-status="low"] { color: var(--green); }

  .setup-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; gap: 20px; padding: 40px;
    background: var(--dark);
  }
  .setup-card {
    background: var(--dark-mid); border: 1px solid var(--border);
    border-radius: 8px; padding: 32px; max-width: 520px; width: 100%;
  }
  .setup-title { font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .setup-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 24px; }
  .setup-step { display: flex; gap: 12px; margin-bottom: 12px; font-size: 13px; color: var(--text-sec); }
  .step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: var(--dark); display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; flex-shrink: 0; }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  .detail-panel {
    position: fixed; right: 0; top: 0; bottom: 0;
    width: 420px; background: var(--dark-mid);
    border-left: 1px solid var(--border-hi);
    z-index: 500; overflow-y: auto;
    padding: 24px;
    transform: translateX(100%);
    transition: transform 0.25s;
  }
  .detail-panel.open { transform: translateX(0); }
</style>
</head>

<script>
// ═══════════════════════════════════════

const SUPABASE_URL = 'https://piiqynherttfgrnlolcm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaXF5bmhlcnR0ZmdybmxvbGNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDM5ODQsImV4cCI6MjA4ODQ3OTk4NH0.ZVnilSkEPnyB6JFTktyctS3CZw0q0VTKACxWVQE0mNs';

// ═══════════════════════════════════════
// SUPABASE CLIENT
// ═══════════════════════════════════════
const sb = {
  async req(method, path, body) {
    const headers = {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
    };
    if (method === 'POST') headers['Prefer'] = 'return=representation';
    if (method === 'PATCH') headers['Prefer'] = 'return=representation';

    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      method,
      headers,
      body: body ? JSON.stringify(body) : undefined
    });

    if (!res.ok) {
      const err = await res.text();
      console.error('Supabase error:', method, path, err);
      throw new Error(err);
    }
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  },
  get: (path) => sb.req('GET', path),
  post: (path, body) => sb.req('POST', path, body),
  patch: (path, body) => sb.req('PATCH', path, body),
  delete: (path) => sb.req('DELETE', path),
};

function toast(msg, type = 'success') {
  const id = Date.now();

function priorityColor(p) {

function statusColor(s) {

}
function fmtDate(d) { return d ? dayjs(d).format('D MMM YYYY') : '—'; }
function fmtDateTime(d) { return d ? dayjs(d).format('D MMM, HH:mm') : '—'; }

// ═══════════════════════════════════════
// DATABASE SETUP
// ═══════════════════════════════════════
const SCHEMA = `
CREATE TABLE IF NOT EXISTS tasks (
  id BIGSERIAL PRIMARY KEY,
  title TEXT NOT NULL,
  description TEXT,
  type TEXT DEFAULT 'maintenance',
  priority TEXT DEFAULT 'medium',
  status TEXT DEFAULT 'created',
  assigned_team TEXT,
  map_feature TEXT,
  start_date DATE,
  due_date DATE,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS task_logs (
  id BIGSERIAL PRIMARY KEY,
  task_id BIGINT REFERENCES tasks(id),
  user_name TEXT,
  time_spent NUMERIC,
  notes TEXT,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS assets (
  id BIGSERIAL PRIMARY KEY,
  asset_name TEXT NOT NULL,
  asset_type TEXT,
  category TEXT NOT NULL DEFAULT 'general_tools',
  serial_number TEXT,
  make_model TEXT,
  purchase_date DATE,
  purchase_value NUMERIC DEFAULT 0,
  current_value NUMERIC DEFAULT 0,
  expected_life_years NUMERIC,
  warranty_expiry DATE,
  supplier TEXT,
  status TEXT DEFAULT 'operational',
  tracking_unit TEXT DEFAULT 'hours',
  current_reading NUMERIC DEFAULT 0,
  service_interval_unit NUMERIC,
  last_service_date DATE,
  last_service_reading NUMERIC DEFAULT 0,
  next_service_due NUMERIC,
  storage_location TEXT,
  notes TEXT,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS asset_logs (
  id BIGSERIAL PRIMARY KEY,
  asset_id BIGINT REFERENCES assets(id),
  log_type TEXT NOT NULL,
  log_date DATE DEFAULT CURRENT_DATE,
  reading NUMERIC,
  description TEXT,
  cost NUMERIC DEFAULT 0,
  done_by TEXT,
  supplier TEXT,
  next_due_reading NUMERIC,
  next_due_date DATE,
  resolved BOOLEAN DEFAULT false,
  notes TEXT,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS environment_observations (
  id BIGSERIAL PRIMARY KEY,
  observation_type TEXT NOT NULL,
  species TEXT,
  count INTEGER,
  location TEXT,
  observer TEXT,
  notes TEXT,
  confidence TEXT,
  timestamp TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS chemicals (
  id BIGSERIAL PRIMARY KEY,
  name TEXT NOT NULL,
  active_ingredient TEXT,
  application_type TEXT,
  hazard_level TEXT DEFAULT 'moderate',
  ppe_required TEXT,
  stock_level NUMERIC DEFAULT 0,
  unit TEXT DEFAULT 'L',
  minimum_level NUMERIC DEFAULT 10,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS chemical_usage (
  id BIGSERIAL PRIMARY KEY,
  chemical_id BIGINT REFERENCES chemicals(id),
  task_id BIGINT REFERENCES tasks(id),
  quantity_used NUMERIC,
  operator TEXT,
  notes TEXT,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS cost_entries (
  id BIGSERIAL PRIMARY KEY,
  task_id BIGINT REFERENCES tasks(id),
  entry_date DATE DEFAULT CURRENT_DATE,
  category TEXT NOT NULL,
  description TEXT,
  quantity NUMERIC DEFAULT 1,
  unit_cost NUMERIC DEFAULT 0,
  total_cost NUMERIC GENERATED ALWAYS AS (quantity * unit_cost) STORED,
  supplier TEXT,
  recorded_by TEXT,
  source TEXT DEFAULT 'manual',
  created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS suppliers (
  id BIGSERIAL PRIMARY KEY,
  name TEXT NOT NULL,
  contact_person TEXT,
  phone TEXT,
  email TEXT,
  account_number TEXT,
  address TEXT,
  notes TEXT,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS stock_items (
  id BIGSERIAL PRIMARY KEY,
  name TEXT NOT NULL,
  supplier_item_id TEXT,
  category TEXT NOT NULL,
  unit TEXT DEFAULT 'unit',
  stock_level NUMERIC DEFAULT 0,
  minimum_level NUMERIC DEFAULT 0,
  current_unit_cost NUMERIC DEFAULT 0,
  storage_location TEXT,
  hazard_class TEXT,
  ppe_required TEXT,
  sds_ref TEXT,
  notes TEXT,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS stock_movements (
  id BIGSERIAL PRIMARY KEY,
  stock_item_id BIGINT REFERENCES stock_items(id),
  movement_type TEXT NOT NULL,
  quantity NUMERIC NOT NULL,
  unit_cost NUMERIC DEFAULT 0,
  total_cost NUMERIC GENERATED ALWAYS AS (quantity * unit_cost) STORED,
  supplier_id BIGINT REFERENCES suppliers(id),
  task_id BIGINT REFERENCES tasks(id),
  invoice_ref TEXT,
  notes TEXT,
  recorded_by TEXT,
  movement_date DATE DEFAULT CURRENT_DATE,
  created_at TIMESTAMPTZ DEFAULT NOW()
);
`;

async function initDB() {
  // Try to query tasks — if it works, DB exists
  try {
    await sb.get('tasks?limit=1');
    state.dbReady = true;
    return true;
  } catch(e) {
    return false;
  }
}

async function createTables() {
  // Use Supabase SQL endpoint (RPC)
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/exec_sql`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ sql: SCHEMA })
    });
    return res.ok;
  } catch(e) { return false; }
}

// Receive stock: supplier tracked on movement record only. Current price = latest received price.
async function receiveStock(itemId, qty, unitCost, supplierId, invoiceRef, recordedBy, notes) {
  try {
    const item = state.stockItems.find(s => s.id === itemId);
    if (!item) { toast('Item not found', 'error'); return; }
    await sb.post('stock_movements', {
      stock_item_id: itemId, movement_type: 'in',
      quantity: qty, unit_cost: unitCost,
      supplier_id: supplierId || null,
      invoice_ref: invoiceRef || null,
      notes: notes || null,
      recorded_by: recordedBy || null,
      movement_date: new Date().toISOString().slice(0,10)
    });
    // Update stock level. New received price becomes current price.
    await sb.patch('stock_items?id=eq.'+itemId, {
      stock_level: Number(item.stock_level) + Number(qty),
      current_unit_cost: unitCost
    });
    // Stock received goes to Stock on Hand — only logged as cost when issued
    // We record the purchase as a stock-on-hand entry (source: stock_in) for reporting
    const sup = state.suppliers.find(s => s.id === supplierId);
    const costCat = {fuel:'fuel',vehicle_generator_spares:'equipment',electrical:'materials',plumbing:'materials',paints_varnish:'materials',general_consumables:'materials',chemicals:'chemicals'};
    await sb.post('cost_entries', {
      category: costCat[item.category] || 'materials',
      description: 'Stock IN: ' + item.name,
      quantity: qty, unit_cost: unitCost,
      supplier: sup ? sup.name : null,
      recorded_by: recordedBy || null,
      entry_date: new Date().toISOString().slice(0,10),
      source: 'stock_on_hand'
    });
    toast('Received ' + qty + ' ' + item.unit + ' of ' + item.name + ' — cost logged');
    await Promise.all([loadStockItems(), loadStockMovements(), loadCostEntries()]);
  } catch(e) { let m=e.message; try{const p=JSON.parse(m);m=p.message||p.error||m;}catch(_){} toast('Error: '+m,'error'); }
}

// Issue stock: no supplier attribution. Cost calculated at current price.
async function issueStock(itemId, qty, taskId, recordedBy, notes) {
  try {
    const item = state.stockItems.find(s => s.id === itemId);
    if (!item) { toast('Item not found', 'error'); return; }
    if (Number(item.stock_level) < Number(qty)) {
      toast('Only ' + item.stock_level + ' ' + item.unit + ' in stock', 'error'); return;
    }
    const unitCost = Number(item.current_unit_cost || 0);
    await sb.post('stock_movements', {
      stock_item_id: itemId, movement_type: 'out',
      quantity: qty, unit_cost: unitCost,
      task_id: taskId || null,
      notes: notes || null,
      recorded_by: recordedBy || null,
      movement_date: new Date().toISOString().slice(0,10)
    });
    await sb.patch('stock_items?id=eq.'+itemId, {
      stock_level: Math.max(0, Number(item.stock_level) - Number(qty))
    });
    const costCat = {fuel:'fuel',vehicle_generator_spares:'equipment',electrical:'materials',plumbing:'materials',paints_varnish:'materials',general_consumables:'materials',chemicals:'chemicals'};
    await sb.post('cost_entries', {
      category: costCat[item.category] || 'materials',
      description: 'Stock OUT: ' + item.name,
      quantity: qty, unit_cost: unitCost,
      task_id: taskId || null,
      recorded_by: recordedBy || null,
      entry_date: new Date().toISOString().slice(0,10),
      source: 'stock_out'
    });
    toast('Issued ' + qty + ' ' + item.unit + ' at R' + unitCost + '/' + item.unit);
    await Promise.all([loadStockItems(), loadStockMovements(), loadCostEntries()]);
  } catch(e) { let m=e.message; try{const p=JSON.parse(m);m=p.message||p.error||m;}catch(_){} toast('Error: '+m,'error'); }
}

// ASSETS
// ═══════════════════════════════════════
function buildAssets() {
  const CAT = {
    high_value: { label:'High Value Assets', color:'var(--accent-hi)', icon:'◈' },
    fire_fighting: { label:'Fire Fighting Assets', color:'var(--red)', icon:'◉' },
    conservation: { label:'Conservation Assets', color:'var(--green)', icon:'◎' },
    general_tools: { label:'General Assets & Tools', color:'var(--text-sec)', icon:'◧' }
  };
  const filter = state.assetCatFilter || 'all';
  const filtered = filter === 'all' ? state.assets : state.assets.filter(a => a.category === filter);

  // Service due — next_service_due <= current_reading + 10% of interval
  const serviceDue = state.assets.filter(a => {
    if (!a.next_service_due || !a.service_interval_unit) return false;
    const buffer = Number(a.service_interval_unit) * 0.1;
    return Number(a.current_reading||0) >= Number(a.next_service_due) - buffer;
  });
  // Warranty expiring within 60 days
  const today = new Date(); const in60 = new Date(today); in60.setDate(in60.getDate()+60);
  const warrantyAlert = state.assets.filter(a => {
    if (!a.warranty_expiry) return false;
    const exp = new Date(a.warranty_expiry);
    return exp >= today && exp <= in60;
  });
  const totalValue = state.assets.reduce((s,a) => s + Number(a.current_value||a.purchase_value||0), 0);
  const needsAttn = state.assets.filter(a => a.status === 'fault' || a.status === 'maintenance').length;

  return `
  <div class="col-gap">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px">
      <div class="section-title" style="margin-bottom:0">
        <div class="section-sub">— Fleet & Equipment</div>
        <div class="section-h">Asset Register</div>
      </div>
      <button class="btn btn-primary" onclick="showModal('newAsset')">+ Register Asset</button>
    </div>

    <div class="grid-4">
      ${statCard('Total Assets', state.assets.length, 'registered', 'var(--accent-hi)')}
      ${statCard('Total Value', 'R'+totalValue.toLocaleString('en-ZA',{maximumFractionDigits:0}), 'current', 'var(--savanna)')}
      ${statCard('Service Due', serviceDue.length, 'alerts', serviceDue.length > 0 ? 'var(--orange)' : 'var(--green)')}
      ${statCard('Needs Attention', needsAttn, 'assets', needsAttn > 0 ? 'var(--red)' : 'var(--green)')}
    </div>

    ${(serviceDue.length || warrantyAlert.length) ? `
    <div class="card" style="border-color:color-mix(in srgb,var(--orange) 40%,var(--border));background:color-mix(in srgb,var(--orange) 5%,var(--dark-mid))">
      <div class="card-title" style="color:var(--orange)">&#9888; Alerts</div>
      ${serviceDue.map(a => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:color-mix(in srgb,var(--orange) 8%,transparent);border-radius:var(--r);margin-bottom:5px">
          <span style="font-size:13px;color:var(--text);font-weight:600">${escHtml(a.asset_name)}</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--orange)">SERVICE DUE — ${a.current_reading} / ${a.next_service_due} ${a.tracking_unit}</span>
        </div>`).join('')}
      ${warrantyAlert.map(a => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:color-mix(in srgb,var(--sky) 8%,transparent);border-radius:var(--r);margin-bottom:5px">
          <span style="font-size:13px;color:var(--text);font-weight:600">${escHtml(a.asset_name)}</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sky)">WARRANTY EXPIRES ${fmtDate(a.warranty_expiry)}</span>
        </div>`).join('')}
    </div>` : ''}

    <div class="filter-row">
      <button class="filter-btn ${filter==='all'?'active':''}" onclick="setAssetFilter('all')">ALL (${state.assets.length})</button>
      ${Object.entries(CAT).map(([k,v]) => {
        const n = state.assets.filter(a=>a.category===k).length;
        return `<button class="filter-btn ${filter===k?'active':''}" onclick="setAssetFilter('${k}')" style="color:${filter===k?'':v.color}">${v.icon} ${v.label.toUpperCase()} (${n})</button>`;
      }).join('')}
    </div>

    <div class="col-gap" style="gap:8px">
      ${filtered.length ? filtered.map(a => {
        const cat = CAT[a.category] || CAT.general_tools;
        const col = cat.color;
        const logs = (state.assetLogs||[]).filter(l => l.asset_id === a.id);
        const lastLog = logs[0];
        const isTracked = ['high_value','fire_fighting','conservation'].includes(a.category);
        const isHighValue = a.category === 'high_value';
        const svcDue = a.next_service_due && Number(a.current_reading||0) >= Number(a.next_service_due) - Number(a.service_interval_unit||0)*0.1;
        const faultFlag = a.status === 'fault' || a.status === 'maintenance';
        const depPct = (a.expected_life_years && a.purchase_date) ?
          Math.min(((new Date()-new Date(a.purchase_date))/(Number(a.expected_life_years)*365.25*24*3600*1000))*100,100) : null;
        const curVal = Number(a.current_value||a.purchase_value||0);
        const logCosts = logs.filter(l=>Number(l.cost||0)>0).reduce((s,l)=>s+Number(l.cost),0);

        return `
        <div class="card" style="${faultFlag?'border-color:color-mix(in srgb,var(--red) 40%,var(--border));':svcDue?'border-color:color-mix(in srgb,var(--orange) 40%,var(--border));':''}cursor:pointer" onclick="openAsset(${a.id})">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px">
                <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:${col};background:color-mix(in srgb,${col} 15%,transparent);padding:2px 7px;border-radius:3px;border:1px solid color-mix(in srgb,${col} 25%,transparent)">${cat.label.toUpperCase()}</span>
                ${a.asset_type ? `<span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);background:var(--surface);padding:2px 6px;border-radius:3px">${escHtml(a.asset_type)}</span>` : ''}
                <span style="font-size:15px;font-weight:700;color:var(--text)">${escHtml(a.asset_name)}</span>
              </div>
              <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);display:flex;gap:14px;flex-wrap:wrap">
                ${a.make_model ? `<span>${escHtml(a.make_model)}</span>` : ''}
                ${a.serial_number ? `<span>S/N: ${escHtml(a.serial_number)}</span>` : ''}
                ${curVal > 0 ? `<span style="color:var(--savanna)">Value: R${curVal.toLocaleString('en-ZA',{maximumFractionDigits:0})}</span>` : ''}
                ${logCosts > 0 ? `<span>Logged costs: R${logCosts.toLocaleString('en-ZA',{maximumFractionDigits:0})}</span>` : ''}
                ${a.warranty_expiry ? `<span style="color:${new Date(a.warranty_expiry)<today?'var(--red)':'var(--sky)'}">Warranty: ${fmtDate(a.warranty_expiry)}</span>` : ''}
                ${isTracked && a.current_reading ? `<span style="color:var(--accent)">${a.current_reading} ${a.tracking_unit}</span>` : ''}
                ${isTracked && a.last_service_date ? `<span>Last service: ${fmtDate(a.last_service_date)}</span>` : ''}
                ${a.storage_location ? `<span>&#128204; ${escHtml(a.storage_location)}</span>` : ''}
              </div>
              ${depPct !== null ? `
              <div style="margin-top:8px">
                <div style="display:flex;justify-content:space-between;margin-bottom:3px">
                  <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted)">ASSET LIFE</span>
                  <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:${depPct>80?'var(--red)':depPct>50?'var(--orange)':'var(--text-muted)'}">${depPct.toFixed(0)}% elapsed</span>
                </div>
                <div style="height:3px;background:var(--surface-hi);border-radius:2px">
                  <div style="height:100%;width:${depPct}%;background:${depPct>80?'var(--red)':depPct>50?'var(--orange)':'var(--green)'};border-radius:2px;transition:width 0.4s"></div>
                </div>
              </div>` : ''}
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;margin-left:12px">
              <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:${statusColor(a.status)};background:color-mix(in srgb,${statusColor(a.status)} 15%,transparent);padding:3px 9px;border-radius:4px;border:1px solid color-mix(in srgb,${statusColor(a.status)} 30%,transparent);white-space:nowrap">${(a.status||'').toUpperCase()}</span>
              ${svcDue ? `<span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--orange);background:color-mix(in srgb,var(--orange) 12%,transparent);padding:2px 7px;border-radius:3px">SERVICE DUE</span>` : ''}
            </div>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-ghost" style="font-size:10px;padding:4px 10px" onclick="event.stopPropagation();openAssetLog(${a.id})">+ Log Entry</button>
            <button class="btn btn-ghost" style="font-size:10px;padding:4px 10px" onclick="event.stopPropagation();openEditAsset(${a.id})">&#9998; Edit</button>
            ${lastLog ? `<span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);padding:4px 0;margin-left:4px">Last: ${lastLog.log_type} — ${fmtDate(lastLog.log_date)}</span>` : ''}
          </div>
        </div>`;
      }).join('') : `<div class="empty card">No assets registered yet</div>`}
    </div>
  </div>`;
}

function buildAssetDetail() {
  const a = state.assets.find(x => x.id === state.selectedAsset);
  if (!a) return '';
  const logs = (state.assetLogs||[]).filter(l => l.asset_id === a.id);
  const CAT = {high_value:'High Value',fire_fighting:'Fire Fighting',conservation:'Conservation',general_tools:'General & Tools'};
  const LOG_COLORS = {service:'var(--green)',check:'var(--sky)',repair:'var(--red)',fuel:'var(--orange)',issue:'var(--red)',mileage:'var(--accent)',hours:'var(--accent)',maintenance:'var(--savanna)'};

            ${a.asset_type?`<span>${escHtml(a.asset_type)}</span>`:''}
            ${a.make_model?`<span>${escHtml(a.make_model)}</span>`:''}
            ${a.serial_number?`<span>S/N: ${escHtml(a.serial_number)}</span>`:''}
            ${a.supplier?`<span>Supplier: ${escHtml(a.supplier)}</span>`:''}
          </div>
        </div>
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${statusColor(a.status)};background:color-mix(in srgb,${statusColor(a.status)} 15%,transparent);padding:5px 12px;border-radius:4px;border:1px solid color-mix(in srgb,${statusColor(a.status)} 30%,transparent)">${(a.status||'').toUpperCase()}</span>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:16px">
        ${a.purchase_value>0?`<div style="background:var(--surface);padding:10px;border-radius:var(--r)"><div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);margin-bottom:3px">PURCHASE VALUE</div><div style="font-size:16px;font-weight:700;color:var(--text)">R${Number(a.purchase_value).toLocaleString('en-ZA',{maximumFractionDigits:0})}</div></div>`:''}
        ${a.current_value>0?`<div style="background:var(--surface);padding:10px;border-radius:var(--r)"><div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);margin-bottom:3px">CURRENT VALUE</div><div style="font-size:16px;font-weight:700;color:var(--savanna)">R${Number(a.current_value).toLocaleString('en-ZA',{maximumFractionDigits:0})}</div></div>`:''}
        ${totalCost>0?`<div style="background:var(--surface);padding:10px;border-radius:var(--r)"><div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);margin-bottom:3px">TOTAL LOGGED COSTS</div><div style="font-size:16px;font-weight:700;color:var(--red)">R${totalCost.toLocaleString('en-ZA',{maximumFractionDigits:0})}</div></div>`:''}
        ${a.current_reading>0?`<div style="background:var(--surface);padding:10px;border-radius:var(--r)"><div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);margin-bottom:3px">CURRENT ${(a.tracking_unit||'').toUpperCase()}</div><div style="font-size:16px;font-weight:700;color:var(--accent)">${a.current_reading} ${a.tracking_unit}</div></div>`:''}
        ${a.next_service_due?`<div style="background:var(--surface);padding:10px;border-radius:var(--r)"><div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);margin-bottom:3px">NEXT SERVICE</div><div style="font-size:16px;font-weight:700;color:var(--orange)">${a.next_service_due} ${a.tracking_unit}</div></div>`:''}
        ${a.warranty_expiry?`<div style="background:var(--surface);padding:10px;border-radius:var(--r)"><div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);margin-bottom:3px">WARRANTY EXPIRES</div><div style="font-size:15px;font-weight:700;color:${new Date(a.warranty_expiry)<new Date()?'var(--red)':'var(--sky)'}">${fmtDate(a.warranty_expiry)}</div></div>`:''}
        ${a.purchase_date?`<div style="background:var(--surface);padding:10px;border-radius:var(--r)"><div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);margin-bottom:3px">PURCHASED</div><div style="font-size:14px;font-weight:700;color:var(--text)">${fmtDate(a.purchase_date)}</div></div>`:''}
        ${a.expected_life_years?`<div style="background:var(--surface);padding:10px;border-radius:var(--r)"><div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);margin-bottom:3px">EXPECTED LIFE</div><div style="font-size:14px;font-weight:700;color:var(--text)">${a.expected_life_years} years</div></div>`:''}

    <div class="card">
      <div class="card-title">&#9670; Log History</div>
      ${logs.length ? `
      <div class="col-gap" style="gap:5px">
        ${logs.map(l => {
          const col = LOG_COLORS[l.log_type]||'var(--text-muted)';
          return `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:9px 12px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border)">
            <div style="display:flex;align-items:flex-start;gap:10px">
              <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:${col};background:color-mix(in srgb,${col} 15%,transparent);padding:2px 7px;border-radius:3px;white-space:nowrap;margin-top:2px">${l.log_type.toUpperCase()}</span>
              <div>
                <div style="font-size:13px;color:var(--text)">${escHtml(l.description||'—')}</div>
                <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap">
                  ${l.done_by?`<span>${escHtml(l.done_by)}</span>`:''}
                  ${l.reading?`<span>${l.reading} ${a.tracking_unit}</span>`:''}
                  ${l.supplier?`<span>${escHtml(l.supplier)}</span>`:''}
                  ${Number(l.cost||0)>0?`<span style="color:var(--savanna)">R${Number(l.cost).toLocaleString('en-ZA',{maximumFractionDigits:0})}</span>`:''}
                  ${l.next_due_reading?`<span>Next due: ${l.next_due_reading} ${a.tracking_unit}</span>`:''}
                  ${l.next_due_date?`<span>Due: ${fmtDate(l.next_due_date)}</span>`:''}
                </div>
                ${l.notes?`<div style="font-size:12px;color:var(--text-sec);margin-top:4px">${escHtml(l.notes)}</div>`:''}
              </div>
            </div>
            <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);flex-shrink:0;margin-left:10px">${fmtDate(l.log_date)}</span>
          </div>`;
        }).join('')}
      </div>` : `<div class="empty" style="padding:16px 0">No log entries yet</div>`}
    </div>
  </div>`;
}

    </div>

    ${lowStock.length > 0 ? `
    <div class="card" style="border-color:color-mix(in srgb,var(--red) 40%,var(--border));background:color-mix(in srgb,var(--red) 5%,var(--dark-mid))">
      <div class="card-title" style="color:var(--red)">⊗ Low Stock Alerts</div>
      ${lowStock.map(c => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:13px;color:var(--text)">${escHtml(c.name)}</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--red)">${c.stock_level}${c.unit} / min ${c.minimum_level}${c.unit}</span>
        </div>
      `).join('')}
    </div>` : ''}

    <div class="col-gap" style="gap:10px">
      ${state.chemicals.length ? state.chemicals.map(c => {
        const isLow = c.stock_level < c.minimum_level;
        const pct = Math.min((c.stock_level / (Math.max(c.minimum_level * 3, 1))) * 100, 100);
        const hazCol = c.hazard_level === 'high' ? 'var(--red)' : c.hazard_level === 'moderate' ? 'var(--orange)' : 'var(--green)';
        const usageLogs = state.chemUsage.filter(u => u.chemical_id === c.id);
        const totalUsed = usageLogs.reduce((s,u) => s + Number(u.quantity_used||0), 0);
        return `
        <div class="card" style="${isLow ? 'border-color:color-mix(in srgb,var(--red) 40%,var(--border))' : ''}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:5px">
                <div style="font-size:15px;font-weight:700;color:var(--text)">${escHtml(c.name)}</div>
                <span style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;color:${hazCol};background:color-mix(in srgb,${hazCol} 15%,transparent);padding:2px 6px;border-radius:3px;border:1px solid color-mix(in srgb,${hazCol} 30%,transparent)">${(c.hazard_level||'').toUpperCase()}</span>
              </div>
              <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-sec);display:flex;gap:12px;flex-wrap:wrap">
                ${c.active_ingredient ? `<span style="font-style:italic;color:var(--text-muted)">${escHtml(c.active_ingredient)}</span>` : ''}
                <span>${c.application_type||''}</span>
                ${c.ppe_required ? `<span style="color:var(--orange)">PPE: ${escHtml(c.ppe_required)}</span>` : ''}
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:16px">
              <div style="font-size:24px;font-weight:800;color:${isLow ? 'var(--red)' : 'var(--text)'};letter-spacing:-1px">${c.stock_level}<span style="font-size:13px;font-weight:400;color:var(--text-sec)"> ${c.unit}</span></div>
              ${isLow ? `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--red)">⊗ BELOW MIN</div>` : ''}
              <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:2px">Total used: ${totalUsed}${c.unit}</div>
            </div>
          </div>
          <div style="height:5px;background:var(--surface-hi);border-radius:3px;margin-bottom:4px">
            <div style="height:100%;width:${pct}%;background:${isLow?'var(--red)':'var(--green)'};border-radius:3px;transition:width 0.5s"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted)">
            <span>Stock: ${c.stock_level}${c.unit}</span>
            <span>Min: ${c.minimum_level}${c.unit}</span>
            <span>${usageLogs.length} usage log${usageLogs.length!==1?'s':''}</span>
          </div>
          <div style="display:flex;gap:8px;margin-top:10px">
            <button class="btn btn-ghost" style="font-size:10px;padding:4px 10px" onclick="openChemUse(${c.id})">Log Use</button>
            <button class="btn btn-ghost" style="font-size:10px;padding:4px 10px" onclick="openStockAdjust(${c.id})">Adjust Stock</button>
          </div>
        </div>`;
      }).join('') : '<div class="empty card">No chemicals registered yet</div>'}
    </div>

    ${recentUsage.length ? `
    <div class="card">
      <div class="card-title">◎ Recent Usage Log</div>
      <div class="col-gap" style="gap:6px">
        ${recentUsage.map(u => {
          const chem = state.chemicals.find(c => c.id === u.chemical_id);
          const task = state.tasks.find(t => t.id === u.task_id);
          return `
          <div class="log-row">
            <div>
              <div style="font-weight:700;font-size:13px;margin-bottom:2px">${chem ? escHtml(chem.name) : 'Unknown'} — ${u.quantity_used}${chem?chem.unit:''}</div>
              <div class="log-meta">${u.operator||'—'} ${task ? '· '+escHtml(task.title) : ''} ${u.notes ? '· '+escHtml(u.notes) : ''}</div>
            </div>
            <div class="log-meta">${fmtDateTime(u.created_at)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}
  </div>`;
}

// ═══════════════════════════════════════
// STOCK
// ═══════════════════════════════════════
function buildStock() {
  const CAT_LABELS = {chemicals:'Chemicals',fuel:'Fuel',vehicle_generator_spares:'Vehicle & Generator Spares',electrical:'Electrical',plumbing:'Plumbing',paints_varnish:'Paints & Varnish',general_consumables:'General Consumables'};
  const CAT_COLORS = {chemicals:'var(--red)',fuel:'var(--orange)',vehicle_generator_spares:'var(--sky)',electrical:'var(--accent)',plumbing:'var(--blue)',paints_varnish:'var(--green-hi)',general_consumables:'var(--text-sec)'};
  const ALL_CATS = Object.keys(CAT_LABELS);
  const filtered = state.stockCatFilter === 'all' ? state.stockItems : state.stockItems.filter(s => s.category === state.stockCatFilter);
  const lowStock = state.stockItems.filter(s => Number(s.minimum_level) > 0 && Number(s.stock_level) < Number(s.minimum_level));
  const totalValue = state.stockItems.reduce((sum,s) => sum + Number(s.stock_level)*Number(s.current_unit_cost||0), 0);
  const q = (state.stockSearch||'').toLowerCase().trim();
  const acResults = q.length >= 2 ? state.stockItems.filter(s => s.name.toLowerCase().includes(q) || (s.supplier_item_id||'').toLowerCase().includes(q)).slice(0,8) : [];
  const noMatch = q.length >= 2 && acResults.length === 0;

  return `
  <div class="col-gap">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px">
      <div class="section-title" style="margin-bottom:0">
        <div class="section-sub">— Operations Stockroom</div>
        <div class="section-h">Stock Management</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="showModal('supplier')">+ Supplier</button>
        <button class="btn btn-ghost" onclick="showModal('stockOut')">Issue Stock</button>
        <button class="btn btn-ghost" onclick="showModal('stockIn')">Receive Delivery</button>
        <button class="btn btn-ghost" onclick="showModal('stocktake')">&#9633; Stock Take</button>
        <button class="btn btn-primary" onclick="showModal('stockIn')">+ New Item</button>
      </div>
    </div>

    <div class="grid-4">
      ${statCard('Stock Items', state.stockItems.length, 'registered', 'var(--accent-hi)')}
      ${statCard('Suppliers', state.suppliers.length, 'active', 'var(--sky)')}
      ${statCard('Low Stock', lowStock.length, 'alerts', lowStock.length > 0 ? 'var(--red)' : 'var(--green)')}
      ${statCard('Stock Value', 'R'+totalValue.toLocaleString('en-ZA',{maximumFractionDigits:0}), 'est.', 'var(--savanna)')}
    </div>

    <!-- Search -->
    <div class="card" style="padding:14px 16px">
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);margin-bottom:8px;letter-spacing:1px">SEARCH — item name or supplier item ID</div>
      <div style="position:relative">
        <input class="form-input" id="stock-search" placeholder="Type to search existing stock, or enter new item name..."
          value="${escHtml(state.stockSearch||'')}" oninput="doStockSearch(this.value)" autocomplete="off">
        ${state.stockSearch ? `<button onclick="doStockSearch('')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px">&#215;</button>` : ''}
      </div>
      ${acResults.length ? `
        <div style="margin-top:6px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden">
          ${acResults.map((s,i) => {
            const col = CAT_COLORS[s.category]||'var(--text-muted)';
            const isLow = Number(s.minimum_level) > 0 && Number(s.stock_level) < Number(s.minimum_level);
            const sup = state.suppliers.find(x => x.id === s.preferred_supplier_id);
            return `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface);${i>0?'border-top:1px solid var(--border)':''};cursor:pointer" onclick="openStockIn(${s.id})">
              <div>
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
                  <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:${col};background:color-mix(in srgb,${col} 15%,transparent);padding:1px 7px;border-radius:3px">${CAT_LABELS[s.category]||s.category}</span>
                  <span style="font-weight:700;font-size:13px;color:var(--text)">${escHtml(s.name)}</span>
                  ${s.supplier_item_id ? `<span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);background:var(--surface-hi);padding:1px 6px;border-radius:3px">${escHtml(s.supplier_item_id)}</span>` : ''}
                </div>
                <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted)">
                  Current price: R${Number(s.current_unit_cost||0).toFixed(2)}/${s.unit} &nbsp;·&nbsp; Min level: ${s.minimum_level} ${s.unit}
                  ${s.storage_location ? ' &nbsp;·&nbsp; '+escHtml(s.storage_location) : ''}
                </div>
              </div>
              <div style="text-align:right;flex-shrink:0;margin-left:14px">
                <div style="font-size:18px;font-weight:800;color:${isLow?'var(--red)':'var(--text)'}">${s.stock_level}<span style="font-size:11px;font-weight:400;color:var(--text-sec)"> ${s.unit}</span></div>
                ${isLow ? `<div style="font-size:9px;color:var(--red);font-family:'JetBrains Mono',monospace">BELOW MIN (${s.minimum_level})</div>` : ''}
              </div>
            </div>`;
          }).join('')}
        </div>
      ` : noMatch ? `
        <div style="margin-top:8px;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border)">
          <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted)">No item found for &ldquo;${escHtml(state.stockSearch)}&rdquo;</span>
          <button class="btn btn-primary" style="font-size:10px;padding:4px 12px" onclick="showModal('stockIn')">+ Receive New Item</button>
        </div>
      ` : ''}
    </div>

    ${lowStock.length > 0 ? `
    <div class="card" style="border-color:color-mix(in srgb,var(--red) 40%,var(--border));background:color-mix(in srgb,var(--red) 5%,var(--dark-mid))">
      <div class="card-title" style="color:var(--red)">&#8855; Low Stock Alerts</div>
      ${lowStock.map(s => {
        const sup = state.suppliers.find(x => x.id === s.preferred_supplier_id);
        return `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:color-mix(in srgb,var(--red) 8%,transparent);border-radius:var(--r);margin-bottom:5px">
          <div>
            <span style="font-size:13px;font-weight:600;color:var(--text)">${escHtml(s.name)}</span>
            ${sup ? `<span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);margin-left:10px">${escHtml(sup.name)}${sup.phone?' · '+escHtml(sup.phone):''}</span>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--red)">${s.stock_level} / min ${s.minimum_level} ${s.unit}</span>
            <button class="btn btn-ghost" style="font-size:9px;padding:3px 8px" onclick="openStockIn(${s.id})">Receive</button>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <!-- Category tabs -->
    <div class="filter-row" style="flex-wrap:wrap">
      <button class="filter-btn ${state.stockCatFilter==='all'?'active':''}" onclick="setStockFilter('all')">ALL (${state.stockItems.length})</button>
      ${ALL_CATS.map(cat => {
        const n = state.stockItems.filter(s=>s.category===cat).length;
        const hasLow = state.stockItems.filter(s=>s.category===cat&&Number(s.minimum_level)>0&&Number(s.stock_level)<Number(s.minimum_level)).length > 0;
        return `<button class="filter-btn ${state.stockCatFilter===cat?'active':''}" onclick="setStockFilter('${cat}')" style="${hasLow?'border-color:var(--red);color:var(--red)':''}">${CAT_LABELS[cat].toUpperCase()} (${n})</button>`;
      }).join('')}
    </div>

    <!-- Stock list -->
    <div class="col-gap" style="gap:8px">
      ${filtered.length ? filtered.map(s => {
        const col = CAT_COLORS[s.category]||'var(--text-muted)';
        const isLow = Number(s.minimum_level) > 0 && Number(s.stock_level) < Number(s.minimum_level);
        const pct = Number(s.minimum_level) > 0 ? Math.min(Number(s.stock_level)/Number(s.minimum_level)*33, 100) : 50;
        const moves = state.stockMovements.filter(m => m.stock_item_id === s.id);
        const totalIn  = moves.filter(m=>m.movement_type==='in').reduce((x,m)=>x+Number(m.quantity||0),0);
        const totalOut = moves.filter(m=>m.movement_type==='out').reduce((x,m)=>x+Number(m.quantity||0),0);
        const estValue = Number(s.stock_level)*Number(s.current_unit_cost||0);
        return `
        <div class="card" style="${isLow?'border-color:color-mix(in srgb,var(--red) 40%,var(--border))':''}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px">
                <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:${col};background:color-mix(in srgb,${col} 15%,transparent);padding:2px 7px;border-radius:3px;border:1px solid color-mix(in srgb,${col} 25%,transparent);white-space:nowrap">${CAT_LABELS[s.category]||s.category}</span>
                <span style="font-size:15px;font-weight:700;color:var(--text)">${escHtml(s.name)}</span>
                ${s.supplier_item_id ? `<span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);background:var(--surface-hi);padding:1px 6px;border-radius:3px">${escHtml(s.supplier_item_id)}</span>` : ''}
              </div>
              <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);display:flex;gap:14px;flex-wrap:wrap">
                <span>Current price: <span style="color:var(--savanna)">R${Number(s.current_unit_cost||0).toFixed(2)}/${s.unit}</span></span>
                ${s.storage_location ? `<span>&#128204; ${escHtml(s.storage_location)}</span>` : ''}
                ${s.sds_ref ? `<a href="${escHtml(s.sds_ref)}" target="_blank" style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sky);text-decoration:none">SDS &#8599;</a>` : ''}
                ${s.ppe_required && s.category==='chemicals' ? `<span style="color:var(--orange)">PPE: ${escHtml(s.ppe_required)}</span>` : ''}
                <span>Total in: ${totalIn} ${s.unit}</span>
                <span>Total out: ${totalOut} ${s.unit}</span>
                ${estValue > 0 ? `<span style="color:var(--savanna)">Value: R${estValue.toLocaleString('en-ZA',{maximumFractionDigits:0})}</span>` : ''}

              </div>
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:12px">
              <div style="font-size:22px;font-weight:800;color:${isLow?'var(--red)':'var(--text)'};letter-spacing:-1px">${s.stock_level}<span style="font-size:12px;font-weight:400;color:var(--text-sec)"> ${s.unit}</span></div>
              ${isLow ? `<div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--red)">MIN: ${s.minimum_level}</div>` : ''}
            </div>
          </div>
          <div style="height:4px;background:var(--surface-hi);border-radius:2px;margin-bottom:8px">
            <div style="height:100%;width:${pct}%;background:${isLow?'var(--red)':col};border-radius:2px;transition:width 0.4s"></div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-ghost" style="font-size:10px;padding:4px 10px" onclick="openStockIn(${s.id})">+ Receive</button>
            <button class="btn btn-ghost" style="font-size:10px;padding:4px 10px" onclick="openStockOut(${s.id})">&#8722; Issue</button>
            <button class="btn btn-ghost" style="font-size:10px;padding:4px 10px;margin-left:auto" onclick="openEditStock(${s.id})">&#9998; Edit</button>
          </div>
        </div>`;
      }).join('') : `<div class="empty card">No stock items ${state.stockCatFilter!=='all'?'in this category ':''}&mdash; click New Item to add</div>`}
    </div>

    <!-- Recent movements -->
    ${state.stockMovements.length ? `
    <div class="card">
      <div class="card-title">&#9701; Recent Movements</div>
      <div class="col-gap" style="gap:5px">
        ${state.stockMovements.slice(0,12).map(m => {
          const item = state.stockItems.find(s => s.id === m.stock_item_id);
          const sup  = state.suppliers.find(s => s.id === m.supplier_id);
          const task = state.tasks.find(t => t.id === m.task_id);
          const isIn = m.movement_type === 'in';
          return `
          <div class="log-row">
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:${isIn?'var(--green)':'var(--orange)'};background:color-mix(in srgb,${isIn?'var(--green)':'var(--orange)'} 12%,transparent);padding:2px 8px;border-radius:3px;min-width:32px;text-align:center">${isIn?'IN':'OUT'}</span>
              <div>
                <div style="font-size:13px;font-weight:700;color:var(--text)">${item?escHtml(item.name):'?'} &mdash; ${m.quantity} ${item?item.unit:''} ${Number(m.total_cost||0)>0?'(R'+Number(m.total_cost).toLocaleString('en-ZA',{maximumFractionDigits:0})+')':''}</div>
                <div class="log-meta">${m.recorded_by||'&mdash;'} ${sup?' &middot; '+escHtml(sup.name):''} ${task?' &middot; '+escHtml(task.title):''} ${m.invoice_ref?' &middot; Inv: '+escHtml(m.invoice_ref):''}</div>
              </div>
            </div>
            <div class="log-meta">${m.movement_date||''}</div>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}

    <!-- Supplier directory -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="card-title" style="margin-bottom:0">&#9671; Supplier Directory</div>
        <button class="btn btn-ghost" style="font-size:10px;padding:4px 10px" onclick="showModal('supplier')">+ Add Supplier</button>
      </div>
      ${state.suppliers.length ? `
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px">
        ${state.suppliers.map(s => `
          <div style="padding:10px 12px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border)">
            <div style="font-weight:700;font-size:13px;color:var(--text);margin-bottom:5px">${escHtml(s.name)}</div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);display:flex;flex-direction:column;gap:2px">
              ${s.contact_person?`<span>Contact: ${escHtml(s.contact_person)}</span>`:''}
              ${s.phone?`<span>Tel: ${escHtml(s.phone)}</span>`:''}
              ${s.email?`<span>${escHtml(s.email)}</span>`:''}
              ${s.account_number?`<span>Acc: ${escHtml(s.account_number)}</span>`:''}
              ${s.address?`<span>${escHtml(s.address)}</span>`:''}
            </div>
          </div>`).join('')}
      </div>` : `<div class="empty" style="padding:16px 0">No suppliers added yet</div>`}
    </div>
  </div>`;
}


// ═══════════════════════════════════════
// COSTS
// ═══════════════════════════════════════
function buildCosts() {
  const cats = ['labour','materials','fuel','equipment','chemicals','repairs','services','other'];
  const catColors = { labour:'var(--green)', materials:'var(--savanna)', fuel:'var(--orange)', equipment:'var(--sky)', chemicals:'var(--red)', repairs:'var(--red-hi)', services:'var(--blue)', other:'var(--text-muted)' };

  // Group by month
  const byMonth = {};
  state.costEntries.forEach(e => {
    const m = e.entry_date ? e.entry_date.slice(0,7) : 'unknown';
    if (!byMonth[m]) byMonth[m] = { total:0, entries:[] };
    byMonth[m].total += Number(e.total_cost||0);
    byMonth[m].entries.push(e);
  });
  const months = Object.keys(byMonth).sort().reverse();

  // Group by category for current view
  const byCat = {};
  state.costEntries.forEach(e => {
    const c = e.category||'other';
    byCat[c] = (byCat[c]||0) + Number(e.total_cost||0);
  });
  const grandTotal = state.costEntries.reduce((s,e) => s + Number(e.total_cost||0), 0);
  const labourTotal = state.taskLogs.reduce((s,l) => s + Number(l.time_spent||0), 0);

  // Task costs
  const taskCosts = {};
  state.costEntries.forEach(e => {
    if (e.task_id) taskCosts[e.task_id] = (taskCosts[e.task_id]||0) + Number(e.total_cost||0);
  });

  return `
  <div class="col-gap">
    <div style="display:flex;justify-content:space-between;align-items:flex-end">
      <div class="section-title" style="margin-bottom:0">
        <div class="section-sub">— Financial Tracking</div>
        <div class="section-h">Cost Management</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="showModal('opCost')">+ Repair / Service</button>
        <button class="btn btn-primary" onclick="showModal('costEntry')">+ Direct Cost</button>
      </div>
    </div>

    <div class="grid-4">

          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">

            <div style="flex:1;height:10px;background:var(--surface);border-radius:2px">
              <div style="height:100%;width:${grandTotal>0?Math.max((byMonth[m].total/Math.max(...months.map(x=>byMonth[x].total)))*100,1):0}%;background:var(--accent);border-radius:2px"></div>
            </div>
            <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);min-width:90px;text-align:right">R${byMonth[m].total.toLocaleString('en-ZA',{maximumFractionDigits:0})}</span>
          </div>
        `).join('') : '<div class="empty" style="padding:16px 0">No entries yet</div>'}

    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="card-title" style="margin-bottom:0">◰ All Cost Entries</div>
        <div style="display:flex;gap:6px">
          ${cats.map(c => `<button class="filter-btn ${state.costCatFilter===c?'active':''}" onclick="setCostFilter('${c}')" style="font-size:9px;padding:3px 8px">${c}</button>`).join('')}
          <button class="filter-btn ${!state.costCatFilter?'active':''}" onclick="setCostFilter('')" style="font-size:9px;padding:3px 8px">ALL</button>
        </div>
      </div>
      <div class="col-gap" style="gap:6px">
        ${state.costEntries.filter(e => !state.costCatFilter || e.category === state.costCatFilter).slice(0,15).map(e => {
          const task = state.tasks.find(t => t.id === e.task_id);
          return `
          <div style="display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:9px 12px;background:var(--surface);border-radius:var(--r)">
            <div>
              <div style="font-size:13px;color:var(--text);margin-bottom:2px">${escHtml(e.description||e.category)}</div>
              <div class="log-meta">${e.category} ${task?'· '+escHtml(task.title):''} ${e.supplier?'· '+escHtml(e.supplier):''} ${e.recorded_by?'· '+escHtml(e.recorded_by):''}</div>
            </div>
            <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted)">${e.entry_date||''}</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--accent-hi)">R${Number(e.total_cost||0).toLocaleString('en-ZA',{maximumFractionDigits:0})}</span>
          </div>`;
        }).join('')}
        ${!state.costEntries.length ? '<div class="empty">No cost entries yet — click Log Cost to start tracking</div>' : ''}
      </div>
    </div>
  </div>`;
}

function buildReports() {
  const tasksByStatus = {};
  state.tasks.forEach(t => { tasksByStatus[t.status] = (tasksByStatus[t.status]||0)+1; });
  const tasksByType = {};
  state.tasks.forEach(t => { tasksByType[t.type] = (tasksByType[t.type]||0)+1; });
  const totalWork = state.taskLogs.reduce((s,l) => s + Number(l.time_spent||0), 0);
  const obsByType = {};
  state.ecoObs.forEach(o => { obsByType[o.observation_type] = (obsByType[o.observation_type]||0)+1; });

  return `
  <div class="col-gap">
    <div class="section-title">
      <div class="section-sub">— Analytics</div>
      <div class="section-h">Operations Reports</div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">◫ Tasks by Status</div>
        ${Object.entries(tasksByStatus).length ? Object.entries(tasksByStatus).map(([s,n]) => `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${statusColor(s)};min-width:100px">${s.replace(/_/g,' ')}</span>
            <div style="flex:1;height:10px;background:var(--surface);border-radius:2px">
              <div style="height:100%;width:${Math.max((n/state.tasks.length)*100,2)}%;background:${statusColor(s)};border-radius:2px"></div>
            </div>
            <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);min-width:20px;text-align:right">${n}</span>
          </div>
        `).join('') : '<div class="empty" style="padding:20px 0">No tasks yet</div>'}
      </div>

      <div class="card">
        <div class="card-title">◈ Tasks by Type</div>
        ${Object.entries(tasksByType).length ? Object.entries(tasksByType).map(([t,n]) => `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-sec);min-width:100px">${t}</span>
            <div style="flex:1;height:10px;background:var(--surface);border-radius:2px">
              <div style="height:100%;width:${Math.max((n/state.tasks.length)*100,2)}%;background:var(--accent);border-radius:2px"></div>
            </div>
            <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text)">${n}</span>
          </div>
        `).join('') : '<div class="empty" style="padding:20px 0">No tasks yet</div>'}
      </div>

      <div class="card">
        <div class="card-title">◉ Ecology — Observations by Type</div>
        ${Object.entries(obsByType).length ? Object.entries(obsByType).map(([t,n]) => `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-sec);min-width:140px">${t.replace(/_/g,' ')}</span>
            <div style="flex:1;height:10px;background:var(--surface);border-radius:2px">
              <div style="height:100%;width:${Math.max((n/state.ecoObs.length)*100,2)}%;background:var(--green);border-radius:2px"></div>
            </div>
            <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text)">${n}</span>
          </div>
        `).join('') : '<div class="empty" style="padding:20px 0">No observations yet</div>'}
      </div>

      <div class="card">
        <div class="card-title">◧ Work Logged</div>
        <div class="stat-value" style="color:var(--accent-hi);margin-bottom:4px">${totalWork.toFixed(1)}<span class="stat-unit">hrs total</span></div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);margin-bottom:14px">${state.taskLogs.length} work log entries</div>
        <div class="col-gap" style="gap:6px">
          ${state.taskLogs.slice(0,4).map(l => `
            <div class="log-row" style="font-size:12px">
              <span style="color:var(--text-sec)">${escHtml(l.user_name||'—')} · ${l.time_spent}h</span>
              <span class="log-meta">${fmtDateTime(l.created_at)}</span>
            </div>
          `).join('')}
          ${!state.taskLogs.length ? '<div class="empty" style="padding:10px 0">No work logged yet</div>' : ''}
        </div>
      </div>
    </div>
  </div>`;
}

function buildTaskDetail() {
  const t = state.tasks.find(x => x.id === state.selectedTask);
  if (!t) return '';
  const logs = state.taskLogs.filter(l => l.task_id === t.id);
  const statusOptions = ['created','assigned','in_progress','completed','verified'];

  return `
  <div style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400" onclick="closeTask()"></div>
  <div style="position:fixed;right:0;top:0;bottom:0;width:440px;background:var(--dark-mid);border-left:1px solid var(--border-hi);z-index:500;overflow-y:auto;padding:24px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
      <div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:2px;margin-bottom:5px">${typeIcon(t.type)} ${(t.type||'').toUpperCase()} TASK</div>
        <div style="font-size:17px;font-weight:700;color:var(--text);line-height:1.3">${escHtml(t.title)}</div>
      </div>
      <button onclick="closeTask()" style="background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-sec);cursor:pointer;padding:4px 10px;font-size:13px">✕</button>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px">
      <div style="background:var(--surface);border-radius:var(--r);padding:10px">
        <div class="stat-label">Priority</div>
        <div style="color:${priorityColor(t.priority)};font-weight:700;text-transform:uppercase;font-family:'JetBrains Mono',monospace;font-size:13px">${t.priority}</div>
      </div>
      <div style="background:var(--surface);border-radius:var(--r);padding:10px">
        <div class="stat-label">Team</div>
        <div style="font-size:13px;color:var(--text)">${t.assigned_team||'—'}</div>
      </div>
      ${t.due_date ? `<div style="background:var(--surface);border-radius:var(--r);padding:10px">
        <div class="stat-label">Due Date</div>
        <div style="font-size:13px;color:var(--text)">${fmtDate(t.due_date)}</div>
      </div>` : ''}
      ${t.map_feature ? `<div style="background:var(--surface);border-radius:var(--r);padding:10px">
        <div class="stat-label">Location</div>
        <div style="font-size:13px;color:var(--text)">${escHtml(t.map_feature)}</div>
      </div>` : ''}
    </div>

    ${t.description ? `<div style="background:var(--surface);border-radius:var(--r);padding:12px;margin-bottom:16px;font-size:13px;color:var(--text-sec);line-height:1.6">${escHtml(t.description)}</div>` : ''}

    <div style="margin-bottom:16px">
      <div class="form-label">Update Status</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${statusOptions.map(s => `
          <button onclick="updateStatus(${t.id},'${s}')" class="btn ${t.status===s?'btn-primary':'btn-ghost'}" style="font-size:10px;padding:5px 10px">${s.replace(/_/g,' ')}</button>
        `).join('')}
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="card-title" style="margin-bottom:0">Work Logs</div>
      <button class="btn btn-ghost" onclick="showModal('logWork')" style="font-size:10px;padding:4px 10px">+ Log Work</button>
    </div>
    <div class="col-gap" style="gap:6px">
      ${logs.length ? logs.map(l => `
        <div class="log-row">
          <div>
            <div style="font-weight:700;font-size:13px;margin-bottom:2px">${escHtml(l.user_name||'—')} · ${l.time_spent}h</div>
            ${l.notes ? `<div style="font-size:12px;color:var(--text-sec)">${escHtml(l.notes)}</div>` : ''}
          </div>
          <div class="log-meta">${fmtDateTime(l.created_at)}</div>
        </div>
      `).join('') : '<div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;color:var(--text-muted);padding:10px 0">No work logged yet</div>'}
    </div>
  </div>`;
}

function buildAssetModal() {
  const editing = state.editingAssetId ? state.assets.find(a => a.id === state.editingAssetId) : null;
  const v = (f, fb='') => editing ? (editing[f]!==null&&editing[f]!==undefined ? editing[f] : fb) : fb;
  const HIGH_VALUE_TYPES = ['4x4 / Game Viewer','Bakkie / LDV','Generator','Tractor','TLB / Loader','Golf Cart','Trailer','Implement','Other'];
  const FF_TYPES = ['Bakkie Sakkie','Fire Beater','Drip Torch','Knapsack Pump','Fire Rake','Other'];
  const CONS_TYPES = ['Brush Cutter','Weed Eater','Knapsack Sprayer','Chain Saw','Pruning Saw','Other'];
  const TOOL_TYPES = ['Power Drill','Angle Grinder','Circular Saw','Jigsaw','Wrench Set','Hand Tools','Ladder','Other'];

  const catSubtypes = {
    high_value: HIGH_VALUE_TYPES, fire_fighting: FF_TYPES,
    conservation: CONS_TYPES, general_tools: TOOL_TYPES
  };
  const selCat = v('category','high_value');
  const subtypes = catSubtypes[selCat] || HIGH_VALUE_TYPES;
  const isTracked = ['high_value','fire_fighting','conservation'].includes(selCat);
  const isHighValue = selCat === 'high_value';

  return `
  <div class="modal-overlay" onclick="if(event.target===this)closeModal('newAsset')">
    <div class="modal" style="width:600px;max-height:92vh;overflow-y:auto">
      <div class="modal-title">◧ ${editing?'Edit Asset':'Register Asset'}</div>

      <div class="form-row">
        <div class="form-group" style="flex:2"><label class="form-label">Asset Name *</label>
          <input class="form-input" id="a-name" placeholder="e.g. Toyota Hilux 2022, John Deere 5055E" value="${escHtml(v('asset_name'))}">
        </div>
        <div class="form-group"><label class="form-label">Status</label>
          <select class="form-select" id="a-status">
            ${['operational','maintenance','fault','written_off','standby'].map(s=>`<option value="${s}" ${v('status','operational')===s?'selected':''}>${s.replace(/_/g,' ').replace(/\w/g,c=>c.toUpperCase())}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Category *</label>
          <select class="form-select" id="a-cat" onchange="assetCatChange(this.value)">
            <option value="high_value" ${v('category')==='high_value'?'selected':''}>High Value Assets</option>
            <option value="fire_fighting" ${v('category')==='fire_fighting'?'selected':''}>Fire Fighting Assets</option>
            <option value="conservation" ${v('category')==='conservation'?'selected':''}>Conservation Assets</option>
            <option value="general_tools" ${v('category')==='general_tools'?'selected':''}>General Assets & Tools</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Asset Type</label>
          <select class="form-select" id="a-type">
            ${subtypes.map(t=>`<option value="${t}" ${v('asset_type')===t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Make / Model</label>
          <input class="form-input" id="a-model" placeholder="e.g. Toyota Hilux 2.8 GD6" value="${escHtml(v('make_model'))}">
        </div>
        <div class="form-group"><label class="form-label">Serial / VIN / Reg</label>
          <input class="form-input" id="a-serial" placeholder="Serial number or registration" value="${escHtml(v('serial_number'))}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Supplier / Dealer</label>
          <input class="form-input" id="a-supplier" placeholder="Who it was bought from" value="${escHtml(v('supplier'))}">
        </div>
        <div class="form-group"><label class="form-label">Storage / Location</label>

          <div class="form-group"><label class="form-label">Purchase Date</label>
            <input class="form-input" id="a-pdate" type="date" value="${v('purchase_date')}">

          </div>
          <div class="form-group"><label class="form-label">Current Value (R)</label>
            <input class="form-input" id="a-cval" type="number" step="0.01" placeholder="0.00" value="${v('current_value','')||''}">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Expected Life (years)</label>
            <input class="form-input" id="a-life" type="number" step="0.5" placeholder="e.g. 10" value="${v('expected_life_years','')||''}">
