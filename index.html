        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Service Interval</label>
            <input class="form-input" id="a-svcint" type="number" step="1" placeholder="e.g. 500 (km or hrs)" value="${v('service_interval_unit','')||''}">
          </div>
          <div class="form-group"><label class="form-label">Last Service Date</label>
            <input class="form-input" id="a-lsvc" type="date" value="${v('last_service_date')}">
          </div>
          <div class="form-group"><label class="form-label">Next Service Due</label>
            <input class="form-input" id="a-nsvc" type="number" placeholder="reading at next service" value="${v('next_service_due','')||''}">
          </div>
        </div>
      </div>

      <div class="form-group"><label class="form-label">Notes</label>
        <textarea class="form-textarea" id="a-notes" placeholder="Condition notes, modifications, known issues...">${escHtml(v('notes'))}</textarea>
      </div>

      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:6px">
        <button class="btn btn-ghost" onclick="closeModal('newAsset')">Cancel</button>
        <button class="btn btn-primary" onclick="submitAsset()">${editing?'Save Changes':'Register Asset'}</button>
      </div>
    </div>
  </div>`;

function buildStocktakeModal() {

    return Object.entries(CAT_LABELS).map(([v,l])=>`<option value="${v}" ${sel===v?'selected':''}>${l}</option>`).join('');

  function unitOpts(sel) {
    return ['L','kg','m','unit','box','roll','bag','tin','pair'].map(u=>`<option value="${u}" ${sel===u?'selected':''}>${u}</option>`).join('');

      <td><input class="st-input st-w80" data-f="supplier_item_id" value="${escHtml(s.supplier_item_id||'')}" placeholder="Slip ID"></td>

        .st-cell-name{display:flex;align-items:center;padding:3px 4px;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap}
        #st-chem-header{display:none}

      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;flex-shrink:0;flex-wrap:wrap;gap:8px">

          <button class="btn btn-primary" id="st-save-btn" onclick="submitStocktake()">Save Stock Take</button>
        </div>
      </div>
    </div>
  </div>`;
}

function attachEvents() {
  // Live total calc for cost entry modal
  setTimeout(() => {
    const qty = document.getElementById('ce-qty');
    const unit = document.getElementById('ce-unit');
    const total = document.getElementById('ce-total');
    if (qty && unit && total) {
      const calc = () => { total.textContent = 'R' + (Number(qty.value||0) * Number(unit.value||0)).toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2}); };
      qty.addEventListener('input', calc);
      unit.addEventListener('input', calc);
    }
    // Stock in total calc
    const sinQty = document.getElementById('sin-qty');
    const sinCost = document.getElementById('sin-cost');
    const sinTotal = document.getElementById('sin-total');
    if (sinQty && sinCost && sinTotal) {
      const calc2 = () => { sinTotal.textContent = 'R' + (Number(sinQty.value||0) * Number(sinCost.value||0)).toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2}); };
      sinQty.addEventListener('input', calc2);
      sinCost.addEventListener('input', calc2);
    }
  }, 100);
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.submitStocktake = async () => {
  const btn = document.getElementById('st-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }
  const rows = document.querySelectorAll('#stocktake-body .st-row');
  let saved = 0, merged = 0, errors = 0;

  for (const row of rows) {
    const get = f => { const el = row.querySelector(`[data-f="${f}"]`); return el ? el.value.trim() : ''; };
    const name = get('name');
    if (!name) continue;

    const data = {
      name,
      supplier_item_id: get('supplier_item_id') || null,
      category: get('category'),
      unit: get('unit') || 'unit',
      stock_level: parseFloat(get('stock_level')) || 0,
      minimum_level: parseFloat(get('minimum_level')) || 0,
      current_unit_cost: parseFloat(get('current_unit_cost')) || 0,
      storage_location: get('storage_location') || null,
      ppe_required: get('ppe_required') || null,
      sds_ref: get('sds_ref') || null,
    };
    const supId = get('supplier_id');
    if (supId) data.preferred_supplier_id = Number(supId);

    const existingId = get('existing_id');
    try {
      if (existingId) {
        // Update existing
        await sb.patch('stock_items?id=eq.'+existingId, data);
        saved++;
      } else {
        // Check for duplicate by name
        const nameLower = name.toLowerCase();
        const dup = state.stockItems.find(s => s.name.toLowerCase() === nameLower);
        if (dup) {
          // Merge — update stock level by adding, update price and other fields
          const mergedLevel = Number(dup.stock_level) + Number(data.stock_level);
          await sb.patch('stock_items?id=eq.'+dup.id, { ...data, stock_level: mergedLevel });
          merged++;
        } else {
          await sb.post('stock_items', data);
          saved++;
        }
      }
    } catch(e) { errors++; console.error('Row error:', name, e); }
  }

  await loadStockItems();
  if (btn) { btn.disabled = false; btn.textContent = 'Save Stock Take'; }
  state.showStocktake = false;
  const msg = `Stock take saved — ${saved} items, ${merged > 0 ? merged+' merged, ' : ''}${errors > 0 ? errors+' errors' : 'no errors'}`;
  toast(msg, errors > 0 ? 'error' : 'success');
  render();
};

window.submitStockIn = async () => {
  const qty  = document.getElementById('sin-qty')?.value;
  const cost = document.getElementById('sin-cost')?.value;
  if (!qty || !cost) { toast('Quantity and unit cost are required','error'); return; }
  const supVal = document.getElementById('sin-sup')?.value;
  let itemId = state.selectedStock;
  if (!itemId) {
    // New item — create stock record first
    const name = document.getElementById('sin-name')?.value?.trim();
    if (!name) { toast('Item name is required','error'); return; }
    // Duplicate check — if name matches existing item, use that
    const nameLower = name.toLowerCase();
    const dup = state.stockItems.find(s => s.name.toLowerCase() === nameLower);
    if (dup) {
      toast('Item "'+name+'" already exists — receiving into existing stock','success');
      itemId = dup.id;
    } else {
      const created = await createStockItem({
        name,
        supplier_item_id: document.getElementById('sin-sid')?.value || null,
        category: document.getElementById('sin-cat')?.value,
        unit: document.getElementById('sin-unit')?.value,
        minimum_level: document.getElementById('sin-min')?.value || 0,
        stock_level: 0,
        current_unit_cost: cost,
        storage_location: document.getElementById('sin-loc')?.value || null,
        ppe_required: document.getElementById('sin-ppe')?.value || null,
        sds_ref: document.getElementById('sin-sds')?.value || null,
      });
      if (!created || !created.id) { toast('Failed to create stock item','error'); return; }
      itemId = created.id;
    }
  }
  await receiveStock(
    itemId, qty, cost,
    supVal ? Number(supVal) : null,
    document.getElementById('sin-inv')?.value,
    document.getElementById('sin-by')?.value,
    document.getElementById('sin-notes')?.value
  );
  state.showStockIn = false; state.selectedStock = null; render();
};
